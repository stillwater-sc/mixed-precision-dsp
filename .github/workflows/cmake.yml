name: CMake

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    concurrency:
      group: cmake-${{ matrix.artifact }}-${{ github.ref }}
      cancel-in-progress: true
    name: "${{ matrix.name }}"
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64 (MSVC)
            artifact: windows-x64-msvc
          - os: ubuntu-latest
            name: Linux x64 (GCC)
            artifact: linux-x64-gcc
          - os: ubuntu-latest
            name: Linux x64 (Clang)
            artifact: linux-x64-clang
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            name: macOS ARM64 (Apple Clang)
            artifact: macos-arm64

    steps:
      - name: Checkout dsp
        uses: actions/checkout@v5

      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          ${{ matrix.cc && format('-DCMAKE_C_COMPILER={0}', matrix.cc) || '' }}
          ${{ matrix.cxx && format('-DCMAKE_CXX_COMPILER={0}', matrix.cxx) || '' }}

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

      - name: Rerun failed tests
        if: failure()
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --rerun-failed --output-on-failure

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: test-logs-${{ matrix.artifact }}
          path: |
            build/Testing
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log

  cross-riscv64:
    concurrency:
      group: cmake-riscv64-${{ github.ref }}
      cancel-in-progress: true
    name: "Linux RISC-V 64 (GCC cross-compile)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dsp
        uses: actions/checkout@v5

      - name: Install RISC-V GCC toolchain and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu g++-riscv64-linux-gnu qemu-user-static

      - name: Configure CMake (RISC-V 64 cross-compile)
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/riscv64-gcc.cmake

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test (via QEMU user-mode)
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

      - name: Rerun failed tests
        if: failure()
        working-directory: build
        run: ctest -C ${{env.BUILD_TYPE}} --rerun-failed --output-on-failure
